<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Inter', sans-serif; background: #07090d; color: #ffffff; padding: 40px; }
        .card { background: #1a1e26; border: 1px solid #d4af37; padding: 30px; border-radius: 12px; }
        .footer { margin-top: 30px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="card" style="background: #1a1e26; border: 1px solid #d4af37; padding: 30px; border-radius: 12px;">
        <h2 style="color: #d4af37; font-size: 24px; margin-top: 0;">New Login Detected</h2>
        <p style="color: #f0f0f0; font-size: 16px; line-height: 1.5;">Hello <strong>{{ user.username }}</strong>,</p>
        <p style="color: #f0f0f0; font-size: 16px; line-height: 1.5;">A new security event was recorded for your account. A login was detected on <span style="color: #d4af37;">{{ timestamp }}</span>.</p>
        <p style="color: #f0f0f0; font-size: 16px; line-height: 1.5;">If this was you, you can safely ignore this message. If not, please contact our protection team immediately.</p>
        <br>
        <div class="footer" style="margin-top: 30px; font-size: 12px; color: #888; border-top: 1px solid #333; padding-top: 15px;">
            &copy; 2026 OctalX Global Trading. System Secure.
        </div>
    </div>
</body>
</html>
