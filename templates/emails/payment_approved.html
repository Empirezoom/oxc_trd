<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Inter', sans-serif; background: #07090d; color: #ffffff; padding: 40px; }
        .card { background: #1a1e26; border: 1px solid #d4af37; padding: 30px; border-radius: 12px; }
        .btn { background: #d4af37; color: #000; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; }
        .footer { margin-top: 30px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="card" style="background: #1a1e26; border: 1px solid #d4af37; padding: 30px; border-radius: 12px;">
        <h2 style="color: #00df82; font-size: 24px; margin-top: 0;">Investment Confirmed ✅</h2>
        <p style="color: #f0f0f0; font-size: 16px;">Hello <strong>{{ user.username }}</strong>,</p>
        <p style="color: #f0f0f0; font-size: 16px;">Your institutional investment for <strong style="color: #d4af37;">{{ payment.plan_name }}</strong> has been successfully verified and activated.</p>
        <p style="color: #f0f0f0; font-size: 16px;">Details:</p>
        <ul style="color: #f0f0f0; font-size: 15px;">
            <li>Amount: <span style="color: #00df82;">${{ payment.amount }}</span></li>
            <li>Status: Verified & Active</li>
        </ul>
        <br>
        <a href="{{ site_url }}/my-investments" class="btn" style="background: #d4af37; color: #000; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block;">View Investments</a>
        <div class="footer" style="margin-top: 30px; font-size: 12px; color: #888; border-top: 1px solid #333; padding-top: 15px;">
            &copy; 2026 OctalX Global Trading. Funds Secured.
        </div>
    </div>
</body>
</html>
